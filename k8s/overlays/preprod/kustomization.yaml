apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blog-preprod

resources:
  - ../../base
  - ingress.yaml

patches:
  # Override namespace
  - target:
      kind: Namespace
      name: blog
    patch: |
      - op: replace
        path: /metadata/name
        value: blog-preprod

  # Single replica with reduced resources for preprod
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

# Note: Removed commonLabels as it modifies service selectors
# but not deployment pod template labels, causing endpoint mismatch
