apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blog-preprod

resources:
  - ../../base

namePrefix: preprod-

patches:
  # Override namespace
  - target:
      kind: Namespace
      name: blog
    patch: |
      - op: replace
        path: /metadata/name
        value: blog-preprod

  # Single replica for preprod
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"

  # Preprod domain
  - target:
      kind: Ingress
      name: web-ingress
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: preprod.PLACEHOLDER_DOMAIN
      - op: replace
        path: /spec/rules/0/host
        value: preprod.PLACEHOLDER_DOMAIN

commonLabels:
  environment: preprod
