apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blog-prod

resources:
  - ../../base
  - hpa.yaml

namePrefix: prod-

patches:
  # Override namespace
  - target:
      kind: Namespace
      name: blog
    patch: |
      - op: replace
        path: /metadata/name
        value: blog-prod

  # 2 replicas for prod
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # Prod domain
  - target:
      kind: Ingress
      name: web-ingress
    patch: |
      - op: replace
        path: /spec/tls/0/hosts/0
        value: PLACEHOLDER_DOMAIN
      - op: replace
        path: /spec/rules/0/host
        value: PLACEHOLDER_DOMAIN

commonLabels:
  environment: prod
