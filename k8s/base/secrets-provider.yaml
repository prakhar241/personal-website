# Azure Key Vault CSI Secrets Store Provider
# This pulls secrets from Azure Key Vault into Kubernetes secrets
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: blog-keyvault
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "8bef2c5d-a5bc-4782-be5a-00284e567ef6"
    keyvaultName: "blog-preprod-kv"
    tenantId: "b82cfd90-71b8-4935-bb10-787f5b23edcb"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: nextauth-secret
          objectType: secret
        - |
          objectName: google-client-id
          objectType: secret
        - |
          objectName: google-client-secret
          objectType: secret
        - |
          objectName: admin-email
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret
        - |
          objectName: azure-storage-account-name
          objectType: secret
        - |
          objectName: azure-storage-account-key
          objectType: secret
        - |
          objectName: eventhub-connection-string
          objectType: secret
        - |
          objectName: eventhub-namespace
          objectType: secret
        - |
          objectName: eventhub-name
          objectType: secret
        - |
          objectName: eventhub-otel-connection-string
          objectType: secret
        - |
          objectName: adx-cluster-uri
          objectType: secret
  secretObjects:
    - secretName: blog-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: nextauth-secret
          key: NEXTAUTH_SECRET
        - objectName: google-client-id
          key: GOOGLE_CLIENT_ID
        - objectName: google-client-secret
          key: GOOGLE_CLIENT_SECRET
        - objectName: admin-email
          key: ADMIN_EMAIL
        - objectName: appinsights-connection-string
          key: NEXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING
        - objectName: azure-storage-account-name
          key: AZURE_STORAGE_ACCOUNT_NAME
        - objectName: azure-storage-account-key
          key: AZURE_STORAGE_ACCOUNT_KEY
        - objectName: appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: eventhub-connection-string
          key: EVENTHUB_CONNECTION_STRING
        - objectName: eventhub-namespace
          key: EVENTHUB_NAMESPACE
        - objectName: eventhub-name
          key: EVENTHUB_NAME
        - objectName: eventhub-otel-connection-string
          key: EVENTHUB_OTEL_CONNECTION_STRING
        - objectName: adx-cluster-uri
          key: ADX_CLUSTER_URI
