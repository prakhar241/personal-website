# Azure Key Vault CSI Secrets Store Provider
# This pulls secrets from Azure Key Vault into Kubernetes secrets
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: blog-keyvault
  namespace: blog
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "PLACEHOLDER_MANAGED_IDENTITY_CLIENT_ID"
    keyvaultName: "PLACEHOLDER_KEYVAULT_NAME"
    tenantId: "PLACEHOLDER_TENANT_ID"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: nextauth-secret
          objectType: secret
        - |
          objectName: google-client-id
          objectType: secret
        - |
          objectName: google-client-secret
          objectType: secret
        - |
          objectName: admin-email
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret
        - |
          objectName: azure-storage-account-name
          objectType: secret
        - |
          objectName: azure-storage-account-key
          objectType: secret
  secretObjects:
    - secretName: blog-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: nextauth-secret
          key: NEXTAUTH_SECRET
        - objectName: google-client-id
          key: GOOGLE_CLIENT_ID
        - objectName: google-client-secret
          key: GOOGLE_CLIENT_SECRET
        - objectName: admin-email
          key: ADMIN_EMAIL
        - objectName: appinsights-connection-string
          key: NEXT_PUBLIC_APPINSIGHTS_CONNECTION_STRING
        - objectName: azure-storage-account-name
          key: AZURE_STORAGE_ACCOUNT_NAME
        - objectName: azure-storage-account-key
          key: AZURE_STORAGE_ACCOUNT_KEY
