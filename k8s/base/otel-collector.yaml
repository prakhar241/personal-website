# ============================================
# OpenTelemetry Collector Deployment
#
# Runs as a sidecar-compatible deployment that
# receives telemetry from the Next.js app and
# exports to Azure Monitor, Event Hubs, and ADX.
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"
          grpc:
            endpoint: "0.0.0.0:4317"
    processors:
      batch:
        timeout: 5s
        send_batch_size: 256
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 64
      resource:
        attributes:
          - key: service.name
            value: "personal-website"
            action: upsert
    exporters:
      azuremonitor:
        connection_string: "${APPLICATIONINSIGHTS_CONNECTION_STRING}"
      kafka:
        protocol_version: "2.0.0"
        brokers:
          - "${EVENTHUB_NAMESPACE}:9093"
        topic: "otel-traces"
        auth:
          sasl:
            mechanism: "PLAIN"
            username: "$$ConnectionString"
            password: "${EVENTHUB_CONNECTION_STRING}"
          tls:
            insecure: false
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [azuremonitor, kafka, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [azuremonitor, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/conf/otel-collector-config.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          env:
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
            - name: EVENTHUB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: EVENTHUB_OTEL_CONNECTION_STRING
            - name: EVENTHUB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: EVENTHUB_NAMESPACE
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: health
      port: 13133
      targetPort: 13133
  type: ClusterIP
