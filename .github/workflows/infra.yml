# =============================================
# Infrastructure Deployment Pipeline
# Separate from app deployment
# =============================================

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - preprod
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    name: Deploy ${{ github.event.inputs.environment }} Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          # Get existing location or default to centralus
          EXISTING_LOCATION=$(az group show --name rg-blog-${{ github.event.inputs.environment }} --query location -o tsv 2>/dev/null || echo "centralus")
          az group create \
            --name rg-blog-${{ github.event.inputs.environment }} \
            --location "$EXISTING_LOCATION" \
            --tags project=personal-blog environment=${{ github.event.inputs.environment }} managedBy=bicep

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-blog-${{ github.event.inputs.environment }}
          template: infra/main.bicep
          parameters: >-
            environment=${{ github.event.inputs.environment }}
            baseName=blog
            adminEmail=${{ secrets.ADMIN_EMAIL }}
            dbAdminPassword=${{ secrets.DB_ADMIN_PASSWORD }}
          deploymentName: blog-infra-${{ github.run_number }}
          failOnStdErr: false

      - name: Verify critical resources
        run: |
          ENV="${{ github.event.inputs.environment }}"
          RG="rg-blog-${ENV}"
          echo "=== Verifying deployment for ${ENV} ==="

          # Check deployment status
          STATUS=$(az deployment group show -g $RG -n blog-infra-${{ github.run_number }} --query "properties.provisioningState" -o tsv)
          echo "Deployment status: $STATUS"
          if [ "$STATUS" != "Succeeded" ]; then
            echo "::error::Deployment did not succeed. Status: $STATUS"
            az deployment operation group list -g $RG -n blog-infra-${{ github.run_number }} \
              --query "[?properties.provisioningState=='Failed'].{resource:properties.targetResource.resourceName,code:properties.statusMessage.error.code,msg:properties.statusMessage.error.message}" -o table
            exit 1
          fi

          # Verify ACS resource exists and is linked to email
          echo "--- Azure Communication Services ---"
          ACS_NAME=$(az communication show --name "blog-${ENV}-acs" -g $RG --query "name" -o tsv 2>/dev/null || true)
          if [ -z "$ACS_NAME" ]; then
            echo "::error::ACS resource not found"
            exit 1
          fi
          echo "ACS: $ACS_NAME ✓"

          # Verify Key Vault secrets exist
          echo "--- Key Vault Secrets ---"
          KV_NAME="blog-${ENV}-kv"
          EXPECTED_SECRETS=("database-url" "acs-connection-string" "acs-sender-address" "eventhub-connection-string" "appinsights-connection-string")
          for secret in "${EXPECTED_SECRETS[@]}"; do
            EXISTS=$(az keyvault secret show --vault-name $KV_NAME --name $secret --query "name" -o tsv 2>/dev/null || true)
            if [ -z "$EXISTS" ]; then
              echo "::warning::Secret '$secret' not found in Key Vault"
            else
              echo "Secret: $secret ✓"
            fi
          done

          # Verify AKS cluster is running
          echo "--- AKS Cluster ---"
          AKS_STATE=$(az aks show --name "blog-${ENV}-aks" -g $RG --query "provisioningState" -o tsv 2>/dev/null || true)
          echo "AKS state: ${AKS_STATE:-NOT FOUND}"

          echo "=== Verification complete ==="

      - name: Output deployment results
        if: always()
        run: |
          ENV="${{ github.event.inputs.environment }}"
          RG="rg-blog-${ENV}"
          echo "## Deployment Summary for ${ENV}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get outputs
          OUTPUTS=$(az deployment group show -g $RG -n blog-infra-${{ github.run_number }} --query "properties.outputs" -o json 2>/dev/null || echo "{}")
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| AKS Cluster | $(echo $OUTPUTS | jq -r '.aksClusterName.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| ACR | $(echo $OUTPUTS | jq -r '.acrLoginServer.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Vault | $(echo $OUTPUTS | jq -r '.keyVaultName.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | $(echo $OUTPUTS | jq -r '.postgresqlFqdn.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| Event Hub | $(echo $OUTPUTS | jq -r '.eventHubNamespace.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| ADX | $(echo $OUTPUTS | jq -r '.adxClusterUri.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| ACS | $(echo $OUTPUTS | jq -r '.acsName.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
          echo "| ACS Sender | $(echo $OUTPUTS | jq -r '.acsSenderAddress.value // "N/A"') |" >> $GITHUB_STEP_SUMMARY
