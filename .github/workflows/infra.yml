# =============================================
# Infrastructure Deployment Pipeline
# Separate from app deployment
# =============================================

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - preprod
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: "8f38adfa-039a-49c0-b063-e935ac1520da"

jobs:
  deploy-infra:
    name: Deploy ${{ github.event.inputs.environment }} Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name rg-blog-${{ github.event.inputs.environment }} \
            --location eastus \
            --tags project=personal-blog environment=${{ github.event.inputs.environment }} managedBy=bicep

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-blog-${{ github.event.inputs.environment }}
          template: infra/main.bicep
          parameters: infra/parameters/${{ github.event.inputs.environment }}.parameters.json
          deploymentName: blog-infra-${{ github.run_number }}
          failOnStdErr: false

      - name: Output deployment results
        run: |
          echo "Infrastructure deployed successfully for ${{ github.event.inputs.environment }}"
