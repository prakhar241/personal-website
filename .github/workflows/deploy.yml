# =============================================
# CI/CD Pipeline for Personal Blog
# Two-stage: preprod (auto) → prod (manual)
# Uses OIDC for Azure authentication
# =============================================

name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: "preprod"
        type: choice
        options:
          - preprod
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: "REDACTED_SUBSCRIPTION_ID"
  ACR_LOGIN_SERVER: "blogacruade2pz6fyows.azurecr.io"
  IMAGE_NAME: "blog-web"

jobs:
  # ==========================================
  # Job 1: Build & Push Docker Image
  # ==========================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name blogacruade2pz6fyows

      - name: Build and push Docker image
        run: |
          docker build -f apps/web/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }} -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ==========================================
  # Job 2: Deploy to Pre-prod (auto on master)
  # ==========================================
  deploy-preprod:
    name: Deploy to Pre-prod
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: preprod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get database URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show --vault-name ${{ secrets.KEYVAULT_NAME }} --name database-url --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Prisma migrations
        run: |
          cd apps/web
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database_url }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-blog-preprod \
            --name blog-preprod-aks \
            --overwrite-existing

      - name: Deploy to AKS (preprod)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl -n blog-preprod set image deployment/web web=$IMAGE
          kubectl -n blog-preprod rollout status deployment/web --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n blog-preprod get pods -l app=web
          kubectl -n blog-preprod get svc web

  # ==========================================
  # Job 3: Deploy to Prod (manual approval)
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    needs: [build, deploy-preprod]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'prod'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get database URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show --vault-name ${{ secrets.KEYVAULT_NAME }} --name database-url-prod --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Prisma migrations
        run: |
          cd apps/web
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database_url }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-blog-prod \
            --name blog-prod-aks \
            --overwrite-existing

      - name: Deploy to AKS (prod)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl -n blog-prod set image deployment/web web=$IMAGE
          kubectl -n blog-prod rollout status deployment/web --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n blog-prod get pods -l app=web
          kubectl -n blog-prod get svc web
