# =============================================
# CI/CD Pipeline for Personal Blog
# - PR to master: build validation
# - Merge to master: build + deploy to preprod
# - Manual dispatch: deploy to prod
# =============================================

name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: "preprod"
        type: choice
        options:
          - preprod
          - prod

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: "blogacruade2pz6fyows.azurecr.io"
  IMAGE_NAME: "blog-web"

jobs:
  # ==========================================
  # Job 1: Validate (runs on PRs)
  # ==========================================
  validate:
    name: Validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/web

      - name: Build Next.js
        run: npm run build
        working-directory: apps/web
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Docker build (no push)
        run: docker build -f apps/web/Dockerfile --build-arg COMMIT_SHA=${{ github.sha }} --build-arg SITE_URL=https://prakharbansal.in -t ${{ env.IMAGE_NAME }}:test .

  # ==========================================
  # Job 2: Build & Push Docker Image (master only)
  # ==========================================
  build:
    name: Build & Push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name blogacruade2pz6fyows

      - name: Build and push Docker image
        run: |
          docker build -f apps/web/Dockerfile --build-arg COMMIT_SHA=${{ github.sha }} --build-arg SITE_URL=https://prakharbansal.in -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }} -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ==========================================
  # Job 2: Deploy to Pre-prod (auto on master)
  # ==========================================
  deploy-preprod:
    name: Deploy to Pre-prod
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: preprod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get database URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show --vault-name ${{ secrets.KEYVAULT_NAME }} --name database-url --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Prisma migrations
        run: |
          cd apps/web
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database_url }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-blog-preprod \
            --name blog-preprod-aks \
            --overwrite-existing

      - name: Deploy to AKS (preprod)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          
          # Apply full kustomize overlay (includes ingress, service, deployment, etc.)
          cd k8s/overlays/preprod
          kustomize edit set image blogacruade2pz6fyows.azurecr.io/blog-web=$IMAGE
          kubectl apply -k .
          
          # Wait for deployment rollout
          kubectl -n blog-preprod rollout status deployment/web --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n blog-preprod get pods -l app=web
          kubectl -n blog-preprod get svc,ingress -n blog-preprod

  # ==========================================
  # Job 3: Deploy to Prod (manual approval)
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    needs: [build, deploy-preprod]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'prod'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get database URL from Key Vault
        id: kv
        run: |
          DB_URL=$(az keyvault secret show --vault-name ${{ secrets.KEYVAULT_NAME }} --name database-url-prod --query value -o tsv)
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Prisma migrations
        run: |
          cd apps/web
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.kv.outputs.database_url }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-blog-prod \
            --name blog-prod-aks \
            --overwrite-existing

      - name: Deploy to AKS (prod)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl -n blog-prod set image deployment/web web=$IMAGE
          kubectl -n blog-prod rollout status deployment/web --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n blog-prod get pods -l app=web
          kubectl -n blog-prod get svc web
